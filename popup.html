<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReelBoost</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <div class="logo">
          <img src="icon48.png" alt="Logo" class="app-logo">
        </div>
        <div class="header-text">
          <h1>ReelBoost</h1>
          <p class="subtitle">Tempo, Reels e Shorts</p>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-site="instagram">Instagram</button>
      <button class="tab" data-site="youtube">YouTube</button>
    </div>

    <div class="content">
      <div class="panel panel-instagram active">
        <div class="stats-grid">
          <div class="stat-card stat-time">
            <div class="stat-label">Tempo Total</div>
            <div class="stat-value time-display" id="ig_totalTime">00:00:00</div>
          </div>
          <div class="stat-card stat-session">
            <div class="stat-label">Sessão Atual</div>
            <div class="stat-value time-display" id="ig_sessionTime">00:00:00</div>
          </div>
          <div class="stat-card stat-reels">
            <div class="stat-label">Reels Assistidos</div>
            <div class="stat-value count-display" id="ig_reelCount">0</div>
          </div>
        </div>
        <div class="settings-section">
          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">Controle de Volume</div>
              <div class="setting-desc">Bolinha flutuante para ajustar volume</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="ig_volumeControlToggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="actions">
          <button id="ig_restartVideoBtn" class="btn btn-secondary btn-compact" style="flex:1">
            <span class="btn-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 5V1L8 5L12 9V5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 11C4 7.13401 7.13401 4 11 4C13.1217 4 15.0783 4.84285 16.5355 6.24264" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M20 13C20 16.866 16.866 20 13 20C10.8783 20 8.92172 19.1571 7.46447 17.7574" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Reiniciar Vídeo</span>
          </button>
          <label class="toggle-switch" style="flex:0 0 auto;">
            <input type="checkbox" id="ig_restartToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="actions">
          <button id="ig_speed2xBtn" class="btn btn-secondary btn-compact" style="flex:1">
            <span class="btn-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 12H11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M13 9L16 12L13 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>Velocidade 1x</span>
          </button>
          <label class="toggle-switch" style="flex:0 0 auto;">
            <input type="checkbox" id="ig_speedToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="actions">
          <button id="ig_resetBtn" class="btn btn-danger">
            <span class="btn-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 4V10H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M23 20V14H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14L18.36 18.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>Zerar Tudo</span>
          </button>
        </div>
      </div>

      <div class="panel panel-youtube">
        <div class="stats-grid">
          <div class="stat-card stat-time">
            <div class="stat-label">Tempo Total</div>
            <div class="stat-value time-display" id="yt_totalTime">00:00:00</div>
          </div>
          <div class="stat-card stat-session">
            <div class="stat-label">Sessão Atual</div>
            <div class="stat-value time-display" id="yt_sessionTime">00:00:00</div>
          </div>
          <div class="stat-card stat-shorts">
            <div class="stat-label">Shorts Assistidos</div>
            <div class="stat-value count-display" id="yt_shortsCount">0</div>
          </div>
        </div>
        <div class="settings-section">
          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">Controle de Volume</div>
              <div class="setting-desc">Bolinha flutuante para ajustar volume</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="yt_volumeControlToggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="actions">
          <button id="yt_resetBtn" class="btn btn-danger">
            <span class="btn-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 4V10H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M23 20V14H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14L18.36 18.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>Zerar Tudo</span>
          </button>
        </div>
      </div>
    </div>
    <div class="footer-credit">By Leffer</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
